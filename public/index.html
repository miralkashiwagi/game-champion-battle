<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b1118" />
    <title>Champion Battle</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="game" aria-label="Champion Battle 3D scene"></canvas>
      <div class="vignette" aria-hidden="true"></div>
      <div id="screen" class="screen-layer"></div>
      <div id="battleHud" class="battle-hud" hidden></div>
      <div id="webglFallback" class="webgl-fallback" hidden>
        <strong>3D表示を開始できません</strong>
        <span>WebGL対応ブラウザで再度お試しください。</span>
      </div>
    </div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
