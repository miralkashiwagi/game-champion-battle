name = "champion-battle"
main = "src/worker.ts"
compatibility_date = "2026-06-11"

[assets]
directory = "./dist/client"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/ws/*"]

[[durable_objects.bindings]]
name = "MATCH_OBJECT"
class_name = "MatchDurableObject"

[[durable_objects.bindings]]
name = "MATCHMAKER_OBJECT"
class_name = "MatchmakerDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MatchDurableObject"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["MatchmakerDurableObject"]
